name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Build atlas-engine
        run: pnpm run build:engine

      - name: Packaging smoke test
        run: |
          cd dist-atlas-engine
          npm pack
          mkdir /tmp/atlas-engine-smoke && cd /tmp/atlas-engine-smoke
          npm init -y
          npm install "$GITHUB_WORKSPACE/dist-atlas-engine"/atlas-engine-*.tgz
          ATLAS_PORT=4499 node node_modules/atlas-engine/atlas.js serve &
          sleep 3
          curl -sf http://127.0.0.1:4499/health
